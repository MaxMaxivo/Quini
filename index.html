<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quini 6 — La Barra</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --verde: #1a4a2e;
    --verde-claro: #3d9960;
    --dorado: #c9a84c;
    --dorado-claro: #e8c96a;
    --crema: #f5f0e8;
    --gris-oscuro: #1a1a1a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--verde);
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(45,110,71,0.4) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.08) 0%, transparent 50%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");
    font-family: 'Barlow', sans-serif;
    color: var(--crema);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #111 0%, #2a1a00 50%, #111 100%);
    border-bottom: 3px solid var(--dorado);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(201,168,76,0.04) 40px, rgba(201,168,76,0.04) 41px);
    pointer-events: none;
  }
  .logo-eyebrow { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--dorado); opacity: .8; }
  .logo-title   { font-family: 'Bebas Neue', sans-serif; font-size: clamp(40px,8vw,70px); color: var(--dorado-claro); line-height: .9; letter-spacing: 2px; text-shadow: 2px 2px 0 rgba(0,0,0,.5), 0 0 40px rgba(201,168,76,.3); }
  .logo-sub     { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; letter-spacing: 6px; text-transform: uppercase; opacity: .45; margin-top: 4px; }

  .header-right { text-align: right; }
  .mis-numeros-label { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--dorado); opacity: .7; margin-bottom: 6px; }
  .mis-numeros-pills { display: flex; gap: 6px; justify-content: flex-end; flex-wrap: wrap; }
  .my-num { background: var(--dorado); color: var(--gris-oscuro); font-family: 'Bebas Neue', sans-serif; font-size: 20px; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,.4); }

  /* ── MAIN ── */
  main { max-width: 920px; margin: 0 auto; padding: 32px 20px 60px; display: flex; flex-direction: column; gap: 28px; }

  /* ── CARD ── */
  .card { background: rgba(255,255,255,.04); border: 1px solid rgba(201,168,76,.2); border-radius: 12px; overflow: hidden; backdrop-filter: blur(4px); }
  .card-header { background: rgba(0,0,0,.25); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; border-bottom: 1px solid rgba(201,168,76,.12); }
  .card-title { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; letter-spacing: 4px; text-transform: uppercase; color: var(--dorado); }
  .card-body { padding: 24px; }

  /* ── MES TABS ── */
  .mes-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
  .mes-tab { background: none; border: 1px solid rgba(201,168,76,.2); color: var(--crema); font-family: 'Barlow Condensed', sans-serif; font-size: 13px; letter-spacing: 1px; padding: 6px 14px; border-radius: 6px; cursor: pointer; opacity: .55; transition: all .2s; text-transform: capitalize; }
  .mes-tab:hover, .mes-tab.active { background: rgba(201,168,76,.15); border-color: var(--dorado); color: var(--dorado-claro); opacity: 1; }

  /* ── SORTEO TABS ── */
  .sorteos-nav { display: flex; gap: 8px; flex-wrap: wrap; padding: 14px 24px; border-bottom: 1px solid rgba(201,168,76,.1); }
  .sorteo-btn { background: none; border: 1px solid rgba(201,168,76,.18); color: var(--crema); font-family: 'Barlow Condensed', sans-serif; font-size: 13px; letter-spacing: 1px; padding: 6px 14px; border-radius: 6px; cursor: pointer; opacity: .55; transition: all .2s; }
  .sorteo-btn:hover, .sorteo-btn.active { background: rgba(201,168,76,.15); border-color: var(--dorado); color: var(--dorado-claro); opacity: 1; }

  /* ── SORTEO DETAIL ── */
  .sorteo-meta { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 22px; }
  .sorteo-fecha { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--dorado-claro); letter-spacing: 1px; line-height: 1.1; }
  .sorteo-concurso { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; opacity: .45; margin-top: 2px; }
  .link-oficial { display: inline-flex; align-items: center; gap: 6px; background: rgba(201,168,76,.1); border: 1px solid rgba(201,168,76,.28); color: var(--dorado); text-decoration: none; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; padding: 8px 14px; border-radius: 6px; transition: all .2s; white-space: nowrap; }
  .link-oficial:hover { background: rgba(201,168,76,.22); color: var(--dorado-claro); }

  .modalidades { display: flex; flex-direction: column; gap: 14px; }
  .modalidad-row { background: rgba(0,0,0,.2); border-radius: 10px; padding: 14px 18px; border-left: 3px solid var(--verde-claro); }
  .modalidad-row.segunda    { border-left-color: #7ec8e3; }
  .modalidad-row.revancha   { border-left-color: var(--dorado); }
  .modalidad-row.siempre    { border-left-color: #b388ff; }
  .modalidad-nombre { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; opacity: .55; margin-bottom: 10px; }
  .numeros-fila { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  .bola { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 20px; flex-shrink: 0; transition: transform .15s; }
  .bola:hover { transform: scale(1.08); }
  .bola.sorteado { background: radial-gradient(circle at 35% 35%, #3a3a3a, #111); color: var(--crema); border: 2px solid rgba(255,255,255,.08); box-shadow: 0 3px 10px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.08); }
  .bola.sorteado.acierto { background: radial-gradient(circle at 35% 35%, #4a8f5a, #1a4a2e); border: 2px solid var(--verde-claro); color: #fff; box-shadow: 0 4px 16px rgba(61,153,96,.55), inset 0 1px 0 rgba(255,255,255,.2); }

  .aciertos-badge { margin-left: auto; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; letter-spacing: 1px; padding: 5px 13px; border-radius: 20px; background: rgba(61,153,96,.15); border: 1px solid rgba(61,153,96,.3); color: var(--verde-claro); white-space: nowrap; }
  .aciertos-badge.cero { background: rgba(255,255,255,.04); border-color: rgba(255,255,255,.08); color: rgba(255,255,255,.3); }
  .aciertos-badge.ganador { background: rgba(201,168,76,.25); border-color: var(--dorado); color: var(--dorado-claro); font-size: 14px; }
  .modalidad-row.pozo-extra { border-left-color: var(--dorado); background: rgba(201,168,76,.06); }

  /* ── RESUMEN ── */
  .resumen-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); gap: 14px; }
  .stat-box { background: rgba(0,0,0,.2); border-radius: 10px; padding: 18px; text-align: center; }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 34px; color: var(--dorado-claro); line-height: 1; }
  .stat-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; opacity: .45; margin-top: 5px; }

  /* ── TICKETS ── */
  .tickets-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 14px; }
  .ticket-slot { aspect-ratio: 3/4; border: 2px dashed rgba(201,168,76,.22); border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: all .2s; position: relative; overflow: hidden; background: rgba(0,0,0,.12); }
  .ticket-slot:hover { border-color: var(--dorado); background: rgba(201,168,76,.05); }
  .ticket-slot img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
  .ticket-add-icon { font-size: 26px; opacity: .28; }
  .ticket-add-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; opacity: .3; }
  .ticket-remove { position: absolute; top: 6px; right: 6px; background: rgba(192,57,43,.85); color: #fff; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 13px; display: none; align-items: center; justify-content: center; z-index: 10; }
  .ticket-slot:hover .ticket-remove { display: flex; }

  /* ── STATES ── */
  .loading-state { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 40px; }
  .spinner { width: 44px; height: 44px; border: 3px solid rgba(201,168,76,.18); border-top-color: var(--dorado); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; opacity: .45; }
  .empty-state { text-align: center; padding: 36px; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 2px; opacity: .4; font-size: 14px; }

  footer { text-align: center; padding: 28px 20px; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; opacity: .22; }

  @media (max-width: 560px) {
    .bola { width: 36px; height: 36px; font-size: 17px; }
    .my-num { width: 30px; height: 30px; font-size: 17px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo-eyebrow">Seguimiento de jugadas</div>
    <div class="logo-title">QUINI 6</div>
    <div class="logo-sub">La Barra</div>
  </div>
  <div class="header-right">
    <div class="mis-numeros-label">Nuestros números</div>
    <div class="mis-numeros-pills" id="mis-pills"></div>
  </div>
</header>

<main>

  <!-- SORTEOS -->
  <div class="card" id="card-sorteos">
    <div class="card-header">
      <span class="card-title">🎱 Resultados por sorteo</span>
      <div class="mes-tabs" id="mes-tabs"></div>
    </div>
    <div id="sorteos-nav" class="sorteos-nav" style="display:none"></div>
    <div class="card-body" id="sorteo-body">
      <div class="loading-state">
        <div class="spinner"></div>
        <div class="loading-text">Cargando resultados...</div>
      </div>
    </div>
  </div>

  <!-- RESUMEN -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">📊 Resumen del mes</span>
    </div>
    <div class="card-body">
      <div class="resumen-grid">
        <div class="stat-box"><div class="stat-num" id="stat-sorteos">—</div><div class="stat-label">Sorteos jugados</div></div>
        <div class="stat-box"><div class="stat-num" id="stat-boletas">—</div><div class="stat-label">Boletas totales</div></div>
        <div class="stat-box"><div class="stat-num" id="stat-costo">—</div><div class="stat-label">Tu parte (1/3)</div></div>
        <div class="stat-box"><div class="stat-num" id="stat-aciertos">—</div><div class="stat-label">Mejor acierto</div></div>
      </div>
    </div>
  </div>

  <!-- TICKETS -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">🎟️ Fotos de tickets</span>
      <span style="font-size:11px;opacity:.35;font-family:'Barlow Condensed',sans-serif;letter-spacing:2px">CLICK PARA AGREGAR</span>
    </div>
    <div class="card-body">
      <div class="tickets-grid" id="tickets-grid"></div>
    </div>
  </div>

</main>

<footer>Quini 6 · Lotería de Santa Fe · Datos actualizados automáticamente</footer>
<input type="file" id="file-input" accept="image/*" multiple style="display:none">

<script>
// ─── ESTADO ──────────────────────────────────────────────────────────────────
let data = null;          // data.json completo
let mesActivo = null;     // "2026-03"
let sorteoActivo = 0;     // índice dentro del mes
let sorteosMes = [];      // sorteos filtrados por mes

// ─── INIT ────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const resp = await fetch('data.json?v=' + Date.now());
    if (!resp.ok) throw new Error('No se pudo cargar data.json');
    data = await resp.json();

    renderMisNumeros();
    renderMesTabs();
    renderTickets();
  } catch(e) {
    document.getElementById('sorteo-body').innerHTML =
      `<div class="empty-state">No se pudo cargar data.json.<br><small style="opacity:.6">${e.message}</small></div>`;
  }
}

// ─── MIS NÚMEROS ─────────────────────────────────────────────────────────────
function renderMisNumeros() {
  const nums = data.mis_numeros || [1,8,17,21,31,33];
  document.getElementById('mis-pills').innerHTML = nums
    .map(n => `<div class="my-num">${String(n).padStart(2,'0')}</div>`).join('');
}

// ─── MES TABS ────────────────────────────────────────────────────────────────
function mesesDisponibles() {
  const set = new Set(data.sorteos.map(s => s.fecha.slice(0,7)));
  return [...set].sort().reverse();
}

function renderMesTabs() {
  const meses = mesesDisponibles();
  if (!meses.length) { document.getElementById('sorteo-body').innerHTML = '<div class="empty-state">Sin datos aún.</div>'; return; }

  mesActivo = meses[0];

  const tabs = document.getElementById('mes-tabs');
  tabs.innerHTML = meses.map(m => {
    const [y, mo] = m.split('-');
    const label = new Date(+y, +mo-1, 1).toLocaleDateString('es-AR', { month: 'short', year: '2-digit' });
    return `<button class="mes-tab ${m===mesActivo?'active':''}" onclick="seleccionarMes('${m}')">${label}</button>`;
  }).join('');

  seleccionarMes(mesActivo);
}

function seleccionarMes(mes) {
  mesActivo = mes;
  document.querySelectorAll('.mes-tab').forEach(b => b.classList.toggle('active', b.textContent === formatMesLabel(mes)));
  // re-render tabs con clase active
  const meses = mesesDisponibles();
  const tabs = document.getElementById('mes-tabs');
  tabs.innerHTML = meses.map(m => {
    const label = formatMesLabel(m);
    return `<button class="mes-tab ${m===mes?'active':''}" onclick="seleccionarMes('${m}')">${label}</button>`;
  }).join('');

  sorteosMes = data.sorteos.filter(s => s.fecha.startsWith(mes));
  sorteoActivo = 0;
  renderSorteosNav();
  mostrarSorteo(0);
  actualizarResumen();
}

function formatMesLabel(m) {
  const [y, mo] = m.split('-');
  return new Date(+y, +mo-1, 1).toLocaleDateString('es-AR', { month: 'short', year: '2-digit' });
}

// ─── SORTEOS NAV ─────────────────────────────────────────────────────────────
function renderSorteosNav() {
  const nav = document.getElementById('sorteos-nav');
  if (!sorteosMes.length) { nav.style.display='none'; return; }
  nav.style.display = 'flex';
  nav.innerHTML = sorteosMes.map((s, i) => {
    const d = new Date(s.fecha + 'T12:00:00');
    const label = d.toLocaleDateString('es-AR', { weekday:'short', day:'numeric', month:'short' });
    return `<button class="sorteo-btn ${i===0?'active':''}" id="sbtn-${i}" onclick="mostrarSorteo(${i})">${label}</button>`;
  }).join('');
}

// ─── SORTEO DETAIL ────────────────────────────────────────────────────────────
function mostrarSorteo(idx) {
  sorteoActivo = idx;
  document.querySelectorAll('.sorteo-btn').forEach((b,i) => b.classList.toggle('active', i===idx));

  const s = sorteosMes[idx];
  if (!s) { document.getElementById('sorteo-body').innerHTML = '<div class="empty-state">Sin datos para este período.</div>'; return; }

  const misNums = data.mis_numeros || [1,8,17,21,31,33];
  const d = new Date(s.fecha + 'T12:00:00');
  const fecha = d.toLocaleDateString('es-AR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  document.getElementById('sorteo-body').innerHTML = `
    <div class="sorteo-meta">
      <div>
        <div class="sorteo-fecha">${fecha}</div>
        <div class="sorteo-concurso">Concurso N° ${s.concurso}</div>
      </div>
      <a class="link-oficial" href="${s.url}" target="_blank">🔗 Ver resultado oficial</a>
    </div>
    <div class="modalidades">
      ${renderModalidad('Tradicional', s.tradicional, '', misNums)}
      ${renderModalidad('Segunda del Quini', s.segunda, 'segunda', misNums)}
      ${renderModalidad('Revancha', s.revancha, 'revancha', misNums)}
      ${renderModalidad('Siempre Sale', s.siempre_sale, 'siempre', misNums)}
      ${renderPozoExtra(s, misNums)}
    </div>`;
}

function renderPozoExtra(s, misNums) {
  const trad  = s.tradicional || [];
  const seg   = s.segunda     || [];
  const rev   = s.revancha    || [];
  // Union sin repetidos de los 3 primeros sorteos
  const union = [...new Set([...trad, ...seg, ...rev])];
  const aciertos = union.filter(n => misNums.includes(n)).length;
  const badgeCls = aciertos === 6 ? 'ganador' : aciertos === 0 ? 'cero' : '';
  const texto = aciertos === 6 ? '🏆 ¡6 aciertos! POZO EXTRA' : `${aciertos} acierto${aciertos !== 1 ? 's' : ''}`;
  return `
    <div class="modalidad-row pozo-extra">
      <div class="modalidad-nombre">Pozo Extra (Trad + Segunda + Revancha)</div>
      <div class="numeros-fila">
        <span class="aciertos-badge ${badgeCls}" style="margin-left:0">${texto}</span>
      </div>
    </div>`;
}

function renderModalidad(nombre, numeros, cls, misNums) {
  if (!numeros || !numeros.length) return '';
  const aciertos = numeros.filter(n => misNums.includes(n)).length;
  const bolas = numeros.map(n => {
    const hit = misNums.includes(n);
    return `<div class="bola sorteado ${hit?'acierto':''}" title="${hit?'¡Acierto!':''}">${String(n).padStart(2,'0')}</div>`;
  }).join('');
  return `
    <div class="modalidad-row ${cls}">
      <div class="modalidad-nombre">${nombre}</div>
      <div class="numeros-fila">
        ${bolas}
        <span class="aciertos-badge ${aciertos===0?'cero':''}">${aciertos} acierto${aciertos!==1?'s':''}</span>
      </div>
    </div>`;
}

// ─── RESUMEN ─────────────────────────────────────────────────────────────────
function actualizarResumen() {
  const precio = data.precio_boleta || 3000;
  const boletas_x = 3;
  const n = sorteosMes.length;
  const misNums = data.mis_numeros || [1,8,17,21,31,33];

  let mejor = 0;
  sorteosMes.forEach(s => {
    ['tradicional','segunda','revancha','siempre_sale'].forEach(m => {
      if (s[m]) {
        const a = s[m].filter(n => misNums.includes(n)).length;
        if (a > mejor) mejor = a;
      }
    });
  });

  const integrantes = data.integrantes || 3;
  const costoTotal = n * boletas_x * precio;
  const costoPorPersona = Math.round(costoTotal / integrantes);

  document.getElementById('stat-sorteos').textContent = n;
  document.getElementById('stat-boletas').textContent = n * boletas_x;
  document.getElementById('stat-costo').textContent = '$' + costoPorPersona.toLocaleString('es-AR');
  document.getElementById('stat-aciertos').textContent = mejor || '—';
}

// ─── TICKETS ─────────────────────────────────────────────────────────────────
let tickets = [];
try { tickets = JSON.parse(localStorage.getItem('quini-tickets') || '[]'); } catch(e) {}

function renderTickets() {
  const grid = document.getElementById('tickets-grid');
  grid.innerHTML = '';
  tickets.forEach((src, i) => {
    const slot = document.createElement('div');
    slot.className = 'ticket-slot';
    slot.innerHTML = `<img src="${src}" alt="Ticket ${i+1}"><button class="ticket-remove" onclick="removeTicket(${i})">✕</button>`;
    grid.appendChild(slot);
  });
  const add = document.createElement('div');
  add.className = 'ticket-slot';
  add.innerHTML = `<div class="ticket-add-icon">📷</div><div class="ticket-add-label">Agregar foto</div>`;
  add.onclick = () => document.getElementById('file-input').click();
  grid.appendChild(add);
}

function removeTicket(i) {
  tickets.splice(i, 1);
  try { localStorage.setItem('quini-tickets', JSON.stringify(tickets)); } catch(e) {}
  renderTickets();
}

document.getElementById('file-input').addEventListener('change', function(e) {
  Array.from(e.target.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      tickets.push(ev.target.result);
      try { localStorage.setItem('quini-tickets', JSON.stringify(tickets)); } catch(e) {}
      renderTickets();
    };
    reader.readAsDataURL(file);
  });
  this.value = '';
});

// ─── GO ──────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
